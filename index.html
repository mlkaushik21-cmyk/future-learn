<!DOCTYPE html>
<html>
<head>
  <title>FutureLearn - Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div style="max-width:400px; margin:auto; padding:20px;">
    <h1>FutureLearn</h1>
    <p>Email/Password login ka form abhi nahi hai, lekin aap mobile se login kar sakte hain.</p>
  </div>

  <!-- Mobile OTP Login Section -->
  <div style="background:#f0f0f0; padding:20px; margin:20px auto; max-width:400px; border-radius:10px; text-align:center;">
    <h3>📱 मोबाइल नंबर से लॉगिन करें</h3>
    <input type="tel" id="mobileNumber" placeholder="+91 9876543210" style="padding:10px; width:80%; margin:5px;">
    <button id="sendOtpBtn" style="padding:10px 20px; background:blue; color:white; border:none; border-radius:5px;">OTP भेजें</button>
    <div id="recaptcha-container" style="margin:5px;"></div>
    <div id="otpSection" style="display:none; margin-top:10px;">
      <input type="text" id="otpCode" placeholder="6 अंकों का OTP डालें" style="padding:10px; width:80%; margin:5px;">
      <button id="verifyBtn" style="padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">लॉगिन करें</button>
    </div>
    <p id="message" style="color:green; margin-top:10px;"></p>
  </div>

  <!-- Firebase SDKs (जरूरी) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

  <script>
    // // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBL8UoZy9F2b0hP0EPdEH9Z0InSnfjMC5w",
  authDomain: "future-learn-85baa.firebaseapp.com",
  projectId: "future-learn-85baa",
  storageBucket: "future-learn-85baa.firebasestorage.app",
  messagingSenderId: "960011606450",
  appId: "1:960011606450:web:e0799215f4376981f0acab",
  measurementId: "G-ZX4W49CGCP"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Mobile OTP Login code
    let confirmationResult;
    let recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      size: 'invisible',
      callback: () => {}
    });

    document.getElementById('sendOtpBtn').onclick = () => {
      let phone = document.getElementById('mobileNumber').value;
      if (!phone) {
        alert("मोबाइल नंबर लिखें (जैसे +91 9876543210)");
        return;
      }
      if (!phone.startsWith('+')) phone = '+' + phone;

      auth.signInWithPhoneNumber(phone, recaptchaVerifier)
        .then(result => {
          confirmationResult = result;
          document.getElementById('otpSection').style.display = 'block';
          document.getElementById('message').innerText = "OTP भेज दिया गया!";
        })
        .catch(err => {
          alert("Error: " + err.message);
          recaptchaVerifier.render().then(widgetId => recaptchaVerifier.reset(widgetId));
        });
    };

    document.getElementById('verifyBtn').onclick = () => {
      let otp = document.getElementById('otpCode').value;
      if (!otp) {
        alert("OTP डालें");
        return;
      }
      confirmationResult.confirm(otp)
        .then(user => {
          alert("लॉगिन सफल! " + user.user.phoneNumber);
          // Redirect chahiye to yahan likhein: window.location.href = "/dashboard.html";
        })
        .catch(() => alert("गलत OTP, फिर से कोशिश करें"));
    };
  </script>
</body>
</html>
