<!DOCTYPE html>
<html>
<head>
    <title>FutureLearn - Mobile OTP Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div style="max-width:400px; margin:100px auto; text-align:center;">
        <h2>📱 Mobile Number se Login</h2>
        <input type="tel" id="mobile" placeholder="+91 9876543210" style="padding:10px; width:90%; margin:5px;">
        <br>
        <button id="sendBtn" style="padding:10px 20px; background:blue; color:white;">Send OTP</button>
        <div id="recaptcha-container"></div>
        <div id="otpBox" style="display:none; margin-top:15px;">
            <input type="text" id="otp" placeholder="Enter 6-digit OTP" style="padding:10px; width:90%;">
            <br>
            <button id="verifyBtn" style="padding:10px 20px; background:green; color:white; margin-top:5px;">Verify & Login</button>
        </div>
        <p id="message" style="margin-top:15px; color:green;"></p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <script>
        // const firebaseConfig = {
  apiKey: "AIzaSyBL8UoZy9F2b0hP0EPdEH9Z0InSnfjMC5w",
  authDomain: "future-learn-85baa.firebaseapp.com",
  projectId: "future-learn-85baa",
  storageBucket: "future-learn-85baa.firebasestorage.app",
  messagingSenderId: "960011606450",
  appId: "1:960011606450:web:e0799215f4376981f0acab",
  measurementId: "G-ZX4W49CGCP"
};

        // Firebase init
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let confirmationResult;
        // reCAPTCHA
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            size: 'invisible',
            callback: () => {}
        });

        document.getElementById('sendBtn').onclick = () => {
            let phone = document.getElementById('mobile').value;
            if (!phone) { alert("Number likho"); return; }
            if (!phone.startsWith('+')) phone = '+' + phone;
            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById('otpBox').style.display = 'block';
                    document.getElementById('message').innerText = "OTP bhej diya!";
                })
                .catch((err) => alert("Error: " + err.message));
        };

        document.getElementById('verifyBtn').onclick = () => {
            let code = document.getElementById('otp').value;
            if (!code) { alert("OTP likho"); return; }
            confirmationResult.confirm(code)
                .then((user) => alert("Login ho gaya! Welcome " + user.user.phoneNumber))
                .catch(() => alert("OTP galat hai"));
        };
    </script>
</body>
</html>
