<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutureLearn Email Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface-2: #f3f0ec;
      --text: #28251d;
      --muted: #6f6a61;
      --border: #d8d2ca;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --success: #2f7a37;
      --error: #a13544;
      --radius: 18px;
      --shadow: 0 20px 50px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Satoshi', sans-serif;
      background: linear-gradient(160deg, #f7f6f2 0%, #efeae3 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 1.2rem + 1vw, 2rem);
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
      margin: 8px 0 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-top: 20px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      font: inherit;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(1, 105, 111, 0.12);
    }

    .btn {
      width: 100%;
      margin-top: 14px;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 180ms ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .msg {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .msg.show { display: block; }
    .msg.info { background: #e7f3f4; color: #0d5b60; }
    .msg.success { background: #e6f4ea; color: var(--success); }
    .msg.error { background: #fbe9ec; color: var(--error); }

    .steps {
      margin-top: 18px;
      padding-left: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .hidden { display: none; }

    .top-note {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-mark">F</div>
      <div>
        <h1>FutureLearn Login</h1>
        <p>Password ke bina email link se sign in karo.</p>
      </div>
    </div>

    <section class="panel" id="requestPanel">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="name@example.com" autocomplete="email" />
      <button class="btn btn-primary" id="sendLinkBtn">Send login link</button>
      <div class="msg" id="requestMsg"></div>
      <ol class="steps">
        <li>Email likho.</li>
        <li>Inbox mein login link khol do.</li>
        <li>Wapas isi page par sign-in complete ho jayega.</li>
      </ol>
    </section>

    <section class="panel hidden" id="completePanel">
      <label for="confirmEmail">Confirm email</label>
      <input id="confirmEmail" type="email" placeholder="same email again if needed" autocomplete="email" />
      <button class="btn btn-primary" id="completeBtn">Complete sign in</button>
      <button class="btn btn-secondary" id="backBtn" type="button">Back</button>
      <div class="msg" id="completeMsg"></div>
      <p class="top-note">Agar aapne link dusre device par khola hai, to email dobara likhna pad sakta hai.</p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      sendSignInLinkToEmail,
      isSignInWithEmailLink,
      signInWithEmailLink
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyBL8UoZy9F2b0hP0EPdEH9Z0InSnfjMC5w',
      authDomain: 'future-learn-85baa.firebaseapp.com',
      projectId: 'future-learn-85baa',
      storageBucket: 'future-learn-85baa.firebasestorage.app',
      messagingSenderId: '960011606450',
      appId: '1:960011606450:web:e0799215f4376981f0acab',
      measurementId: 'G-ZX4W49CGCP'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const requestPanel = document.getElementById('requestPanel');
    const completePanel = document.getElementById('completePanel');
    const emailInput = document.getElementById('email');
    const confirmEmail = document.getElementById('confirmEmail');
    const sendLinkBtn = document.getElementById('sendLinkBtn');
    const completeBtn = document.getElementById('completeBtn');
    const backBtn = document.getElementById('backBtn');

    const requestMsg = document.getElementById('requestMsg');
    const completeMsg = document.getElementById('completeMsg');

    function showMessage(el, text, type) {
      el.className = 'msg show ' + type;
      el.textContent = text;
    }

    function clearMessage(el) {
      el.className = 'msg';
      el.textContent = '';
    }

    const actionCodeSettings = {
      url: window.location.origin + window.location.pathname,
      handleCodeInApp: true
    };

    sendLinkBtn.addEventListener('click', async () => {
      clearMessage(requestMsg);
      const email = emailInput.value.trim();

      if (!email) {
        showMessage(requestMsg, 'Please enter your email first.', 'error');
        return;
      }

      sendLinkBtn.disabled = true;
      sendLinkBtn.textContent = 'Sending...';

      try {
        await sendSignInLinkToEmail(auth, email, actionCodeSettings);
        localStorage.setItem('emailForSignIn', email);
        showMessage(requestMsg, 'Login link sent. Inbox aur spam folder dono check karo.', 'success');
      } catch (error) {
        showMessage(requestMsg, 'Error: ' + error.message, 'error');
      } finally {
        sendLinkBtn.disabled = false;
        sendLinkBtn.textContent = 'Send login link';
      }
    });

    async function completeEmailLinkSignIn() {
      clearMessage(completeMsg);
      let email = localStorage.getItem('emailForSignIn') || confirmEmail.value.trim();

      if (!email) {
        showMessage(completeMsg, 'Same email dobara likho jo link bhejne ke liye use ki thi.', 'error');
        return;
      }

      completeBtn.disabled = true;
      completeBtn.textContent = 'Signing in...';

      try {
        const result = await signInWithEmailLink(auth, email, window.location.href);
        localStorage.removeItem('emailForSignIn');
        showMessage(completeMsg, 'Login successful: ' + result.user.email, 'success');
        setTimeout(() => {
          window.location.href = './dashboard.html';
        }, 1200);
      } catch (error) {
        showMessage(completeMsg, 'Error: ' + error.message, 'error');
      } finally {
        completeBtn.disabled = false;
        completeBtn.textContent = 'Complete sign in';
      }
    }

    completeBtn.addEventListener('click', completeEmailLinkSignIn);
    backBtn.addEventListener('click', () => {
      completePanel.classList.add('hidden');
      requestPanel.classList.remove('hidden');
      clearMessage(completeMsg);
    });

    if (isSignInWithEmailLink(auth, window.location.href)) {
      requestPanel.classList.add('hidden');
      completePanel.classList.remove('hidden');
      const savedEmail = localStorage.getItem('emailForSignIn');
      if (savedEmail) confirmEmail.value = savedEmail;
      showMessage(completeMsg, 'Link detect ho gaya. Zarurat ho to email confirm karke sign in complete karo.', 'info');
    }
  </script>

  <!--
  Firebase setup:
  1. Firebase Console > Authentication > Sign-in method > Enable Email link (passwordless sign-in).
  2. Firebase Console > Authentication > Settings > Authorized domains > add your Netlify domain.
  3. Optional: create dashboard.html or replace redirect path after login.
  Docs: Firebase says the redirect URL domain must be in Authorized Domains and handleCodeInApp must be true.
  -->
</body>
</html>
